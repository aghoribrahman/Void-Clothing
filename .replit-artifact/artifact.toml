kind = "web"
previewPath = "/"
title = "VOID — Gen-Z Fashion Storefront"
version = "1.0.0"
id = "void-clothing-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18539
name = "web"
paths = ["/"]

[services.development]
run = "pnpm run dev"

[services.env]
PORT = "18539"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "run", "build"]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
