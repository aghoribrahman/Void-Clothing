kind = "web"
previewPath = "/"
title = "VOID — Gen-Z Fashion Storefront"
version = "1.0.0"
id = "artifacts/storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18539
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/storefront run dev"

[services.env]
PORT = "18539"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/storefront", "run", "build"]
publicDir = "artifacts/storefront/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
